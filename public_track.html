<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Tracking {{ order.invoice_no }}</title>
</head>
<body class="p-3">
  <div class="container">
    <h3>Tracking Order: {{ order.invoice_no }}</h3>
    <p>Customer: {{ order.customer_name }}</p>
    <p>Phone: {{ order.phone }}</p>
    <ul class="list-group">
      {% for i, s in enumerate(stages) %}
      <li class="list-group-item {% if i <= order.stage %}list-group-item-success{% endif %}">
        {{ i+1 }}. {{ s }}
      </li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
